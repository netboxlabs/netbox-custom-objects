{% extends base_template %}
{% load helpers %}
{% load render_table from django_tables2 %}
{% load i18n %}

{% block content %}
  <div class="card">
    <div class="table-responsive">
      {% render_table table 'inc/table.html' %}
    </div>
  </div>
  {% if perms.tenancy.add_contactassignment %}
    <div class="text-end mb-3">
      <a href="{% url 'tenancy:contactassignment_add' %}?object_type={{ object|content_type_id }}&object_id={{ object.pk }}&return_url={% url 'plugins:netbox_custom_objects:customobject_contacts' object.custom_object_type.slug object.pk %}" class="btn btn-primary">
        <i class="mdi mdi-plus-thick" aria-hidden="true"></i> {% trans "Add a contact" %}
      </a>
    </div>
  {% endif %}
{% endblock %}
