site_name: NetBox Custom Objects
repo_name: netboxlabs/netbox-custom-objects
repo_url: https://github.com/netboxlabs/netbox-custom-objects
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - navigation.footer
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/lightbulb-outline
        name: Switch to Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/lightbulb
        name: Switch to Light Mode
plugins:
  - search:
      lang: en
markdown_extensions:
    - admonition
    - attr_list
    - footnotes
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.tabbed:
        alternate_style: true
nav:
    - Introduction: 'index.md'
    - Installation: 'installation.md'
    - Field Attributes: 'field-attributes.md'
    - Branching Support: 'branching.md'
    - REST API: 'rest-api.md'
    - GraphQL API: 'graphql.md'
    - Portable Schema: 'portable-schema.md'
    - Releases: 'releases.md'
